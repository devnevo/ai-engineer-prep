# Docker Compose for local development
# Day 7 will add PGVector and Redis services

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=Knowledge Assistant
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - UPLOAD_DIR=/app/uploads
    volumes:
      # Mount uploads directory for persistence across restarts
      - upload_data:/app/uploads
    healthcheck:
      test: [ "CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
